name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  frontend:
    name: Frontend — lint + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: football-manager
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: football-manager/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  backend:
    name: Backend — build + tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: football-manager/server
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: fdf
          POSTGRES_PASSWORD: fdf_dev_password
          POSTGRES_DB: managerfdf_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd="pg_isready -U fdf -d managerfdf_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      DATABASE_URL: postgresql://fdf:fdf_dev_password@localhost:5432/managerfdf_test?schema=public
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci_jwt_secret_for_tests_only_change_in_real_deploys
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: football-manager/server/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      - run: npx prisma db push --skip-generate
      - run: npm run build
      - name: Tests
        run: npm test --if-present

  e2e:
    name: E2E — Playwright smoke
    runs-on: ubuntu-latest
    needs: [frontend]
    defaults:
      run:
        working-directory: football-manager
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: football-manager/package-lock.json
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
        env:
          CI: true

  docker:
    name: Docker — build de la imagen del backend
    runs-on: ubuntu-latest
    needs: [frontend, backend, e2e]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: football-manager
          file: football-manager/server/Dockerfile.backend
          push: false
          tags: managerfdf-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
